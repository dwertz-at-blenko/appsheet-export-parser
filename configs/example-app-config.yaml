# Example App — Table Classification
# Copy this file and customize for your AppSheet app.
# Usage: appsheet-parse pdf myapp-docs.pdf --config configs/myapp-app-config.yaml

table_classification:
  core:
    - Employee
    - Orders
    - Products
    - Customers
    - Inventory
    - Departments

  process:
    # Automation runtime artifacts — document but don't migrate data
    - "Process for *"
    - "* Output"
    - "* Output 2"
    - "Script Output"
    - "Stop Script Output"

  skip:
    # UI-only tables
    - Home
    - Buttons
    - Dashboard

migration_target: postgres
