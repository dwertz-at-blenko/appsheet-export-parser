# Example App — Domain Color Groups
# Copy this file and customize for ERD visualization.
# Group related tables into color-coded domains.

app_name: "My App"

domains:
  Sales:
    color: "#1565C0"
    fill: "#E3F2FD"
    tables:
      - Orders
      - Customers
      - Products

  People:
    color: "#2E7D32"
    fill: "#E8F5E9"
    tables:
      - Employee
      - Departments

  Inventory:
    color: "#E65100"
    fill: "#FFF3E0"
    tables:
      - Inventory
      - Warehouses

  Fulfillment:
    color: "#00838F"
    fill: "#E0F7FA"
    tables:
      - Shipments
      - Returns

  Config:
    color: "#546E7A"
    fill: "#ECEFF1"
    tables:
      - Settings
      - Exclusions
